<main class="app-shell">
  <header class="app-header">
    <div>
      <p class="eyebrow">Cronometraje manual de meta</p>
      <h1>Kronometa</h1>
    </div>
    <p class="status">{{control.statusText}}</p>
  </header>

  <div class="flow-steps" aria-label="Estado de la carrera">
    <pick-action action="requestModeStep">
      <button type="button" class="{{phase === 'select_mode' ? 'active' : ''}}" disabled="{{!canGoToMode}}" aria-current="{{phase === 'select_mode' ? 'step' : 'false'}}">Modo de salida</button>
    </pick-action>
    <pick-select>
      <on condition="{{showRunnersStep}}">
        <span class="flow-separator" aria-hidden="true">&gt;</span>
        <pick-action action="requestRunnersStep">
          <button type="button" class="{{phase === 'register_runners' ? 'active' : ''}}" disabled="{{!canGoToRunners}}" aria-current="{{phase === 'register_runners' ? 'step' : 'false'}}">Registro de corredores</button>
        </pick-action>
      </on>
    </pick-select>
    <pick-select>
      <on condition="{{showRaceStep}}">
        <span class="flow-separator" aria-hidden="true">&gt;</span>
        <button type="button" class="{{phase === 'ready_to_start' || phase === 'running_mass' || phase === 'running_staggered' ? 'active' : ''}}" disabled="true" aria-current="{{phase === 'ready_to_start' || phase === 'running_mass' || phase === 'running_staggered' ? 'step' : 'false'}}">Carrera en curso</button>
      </on>
    </pick-select>
    <pick-select>
      <on condition="{{showResultsStep}}">
        <span class="flow-separator" aria-hidden="true">&gt;</span>
        <button type="button" class="{{phase === 'finished' ? 'active' : ''}}" disabled="true" aria-current="{{phase === 'finished' ? 'step' : 'false'}}">Resultados</button>
      </on>
    </pick-select>
  </div>

  <pick-router>
    <template data-route="/">
      <setup-mode-view></setup-mode-view>
    </template>
    <template data-route="/setup/mode">
      <setup-mode-view></setup-mode-view>
    </template>
    <template data-route="/setup/runners">
      <runner-setup-view></runner-setup-view>
    </template>
    <template data-route="/race">
      <race-view></race-view>
    </template>
    <template data-route="/results">
      <results-view></results-view>
    </template>
    <template data-route="*">
      <setup-mode-view></setup-mode-view>
    </template>
  </pick-router>
</main>
